<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>APD Ofertas - Políticas Legales</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f7fa;
      color: #1a1a2e;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
      padding: 2.5rem 2rem;
      max-width: 480px;
      width: 100%;
      text-align: center;
    }

    .logo {
      font-size: 2rem;
      font-weight: 700;
      color: #2563eb;
      margin-bottom: 0.25rem;
      letter-spacing: -0.5px;
    }

    .logo span {
      color: #1a1a2e;
    }

    h1 {
      font-size: 1.1rem;
      font-weight: 500;
      color: #6b7280;
      margin-bottom: 2rem;
    }

    nav {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    nav a {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      background: #f0f4ff;
      border: 1px solid #dbeafe;
      border-radius: 8px;
      padding: 0.9rem 1.2rem;
      text-decoration: none;
      color: #1e40af;
      font-weight: 500;
      font-size: 0.95rem;
      transition: background 0.15s, border-color 0.15s;
    }

    nav a:hover {
      background: #dbeafe;
      border-color: #93c5fd;
    }

    nav a .icon {
      font-size: 1.2rem;
      flex-shrink: 0;
    }

    footer {
      margin-top: 2rem;
      font-size: 0.8rem;
      color: #9ca3af;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">APD <span>Ofertas</span></div>
    <h1>Políticas Legales</h1>

    <nav>
      <a href="privacy-policy.html">
        <span class="icon">🔒</span>
        Política de Privacidad
      </a>
      <a href="terms.html">
        <span class="icon">📄</span>
        Términos y Condiciones
      </a>
      <a href="delete-account.html">
        <span class="icon">🗑️</span>
        Eliminación de Cuenta
      </a>
    </nav>

    <footer>
      &copy; 2026 APD Ofertas. Todos los derechos reservados.
    </footer>
  </div>
</body>
</html>
